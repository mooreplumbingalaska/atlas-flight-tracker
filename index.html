<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#07111f" />
  <title>Atlas Flight Tracker</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div><h1>Atlas Flight Tracker</h1><p id="status">Starting…</p></div>
    <button id="refreshBtn">Refresh</button>
  </header>
  <section class="controls">
    <input id="search" placeholder="Search callsign, e.g. ASA123" autocomplete="off" />
    <select id="area">
      <option value="tacoma">Tacoma</option>
      <option value="pnw">PNW</option>
      <option value="alaska">Alaska</option>
      <option value="usa">USA</option>
    </select>
    <button id="installBtn" hidden>Install</button>
  </section>
  <main id="map"></main>
  <section id="panel" class="panel"><strong>Fix installed:</strong> visible aircraft markers and real API error messages.</section>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
